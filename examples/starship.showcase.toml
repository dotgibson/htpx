"$schema" = 'https://starship.rs/config-schema.json'

# ════════════════════════════════════════════════════════════════════════════
# examples/starship.showcase.toml  —  a "what else is possible" starship variant
#
# This is NOT your daily prompt. It reuses your tokyonight-storm palette but
# demonstrates features your live core/starship/starship.toml doesn't use yet:
#   • a RIGHT-aligned prompt half (fill + right_format) — push time/cmd_duration
#     to the right edge so the left stays short
#   • a [custom] module (arbitrary command → segment, e.g. AWS profile, k8s, vpn)
#   • [sudo], [shell], [battery], [env_var], [memory_usage]
#   • palette switching (one line flips the whole scheme)
#
# Try it WITHOUT touching your real prompt:
#   STARSHIP_CONFIG=~/dotfiles-MacBook/examples/starship.showcase.toml starship prompt
#   # or for a live shell:  STARSHIP_CONFIG=... exec zsh
# ════════════════════════════════════════════════════════════════════════════

# LEFT prompt: short. $fill eats the middle. RIGHT prompt: the noisy stuff.
format = """
$os\
$directory\
$git_branch\
$git_status\
$git_metrics\
$fill\
$kubernetes\
$aws\
$custom\
$cmd_duration\
$time\
$line_break\
$sudo$character"""

# The right-hand prompt (zsh/fish/bash). Could also carry git/cloud info instead.
right_format = """$shell$battery$memory_usage"""

continuation_prompt = "[∙](fg:color_comment) "   # the > > on multi-line input

palette = 'tokyonight_storm'
# Flip to a second palette by changing ONE line above. Define more below.
[palettes.tokyonight_storm]
color_fg0='#c0caf5'
color_blue='#7aa2f7'
color_aqua='#7dcfff'
color_green='#9ece6a'
color_orange='#ff9e64'
color_purple='#bb9af7'
color_red='#f7768e'
color_yellow='#e0af68'
color_comment='#565f89'
color_srf1='#24283b'
color_srf2='#1f2335'

# ── fill: stretches between left and right halves ────────────────────────────
[fill]
symbol = " "          # use "·" or "─" for a visible rule across the line

[os]
disabled = false
style = "fg:color_blue"
[os.symbols]
Macos = "󰀵 "

[directory]
style = "fg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
read_only = "  "       # NEW vs your config: lock icon in read-only dirs
read_only_style = "fg:color_red"
repo_root_style = "bold fg:color_yellow"   # make the git-root segment pop
before_repo_root_style = "fg:color_comment"

[git_branch]
symbol = " "
style = "fg:color_green"
format = '[$symbol$branch]($style) '

[git_status]
style = "fg:color_orange"
format = '([$all_status$ahead_behind]($style) )'

[git_metrics]
disabled = false
added_style = "fg:color_green"
deleted_style = "fg:color_red"
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'

# ── [custom]: the real power — any command becomes a segment ──────────────────
# Example: show the active VPN/tunnel interface (matches your tmux-netinfo idea).
[custom.vpn]
description = "active tunnel interface"
command = "ifconfig | awk '/^(utun|wg|tun)/{print $1; exit}' | tr -d ':'"
when = "ifconfig | grep -qE '^(utun|wg|tun)'"
symbol = "󰦝 "
style = "fg:color_purple"
format = '[$symbol$output]($style) '
# Other classic [custom] uses: gcloud project, terraform workspace, 1Password
# account, current Burp/engagement tag from an env var, etc.

[kubernetes]
disabled = false
symbol = "󱃾 "
style = "fg:color_aqua"
format = '[$symbol$context]($style) '
detect_folders = ['k8s', '.helm']

[aws]
symbol = " "
style = "fg:color_orange"
format = '[$symbol($profile )(\($region\) )]($style)'
# disabled by default elsewhere; shows AWS_PROFILE/region when set

[env_var.ENGAGEMENT]            # show a custom env var when present (e.g. client tag)
variable = "ENGAGEMENT"
symbol = "🎯 "
style = "fg:color_red"
format = '[$symbol$env_value]($style) '

[cmd_duration]
min_time = 500
style = "fg:color_orange"
format = '[󰔛 $duration]($style) '

[time]
disabled = false
time_format = "%R"
style = "fg:color_comment"
format = '[ $time]($style)'

# ── RIGHT prompt modules ─────────────────────────────────────────────────────
[shell]
disabled = false
style = "fg:color_comment"
zsh_indicator = "zsh"
format = '[$indicator]($style) '

[battery]
format = '[$symbol$percentage]($style) '
[[battery.display]]
threshold = 20
style = "fg:color_red"
[[battery.display]]
threshold = 100
style = "fg:color_comment"

[memory_usage]
disabled = false
threshold = 80          # only show when RAM > 80%
symbol = "󰍛 "
style = "fg:color_purple"
format = '[$symbol$ram_pct]($style) '

[sudo]
disabled = false        # shows a marker while sudo creds are cached
symbol = "󱐋 "
style = "fg:color_yellow"
format = '[$symbol]($style)'

[character]
success_symbol = '[](bold fg:color_green)'
error_symbol = '[](bold fg:color_red)'
