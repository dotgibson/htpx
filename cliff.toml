# cliff.toml — git-cliff config for DRAFTING a GitHub Release body from this repo's
# Conventional Commits (`make release-notes`).
#
# Deliberately scoped — read before assuming this generates the changelog:
#   • NOT a CHANGELOG generator. CHANGELOG.md is hand-curated prose (rationale, not
#     commit subjects) and is promoted [Unreleased] → dated heading by
#     scripts/release.sh. git-cliff is never wired to write or overwrite it.
#   • This repo does NOT git-tag releases (it versions via core.version + CHANGELOG
#     headings), so `make release-notes` hands git-cliff an explicit commit RANGE
#     (since the last `release vX` commit) instead of relying on tags to delimit.
#   • Dev-tooling only: no runtime/per-shell cost, not a Core module, not in
#     core.manifest (it lives in the audit's repo-meta allowlist). https://git-cliff.org

[changelog]
header = ""
# Tera template: one section per commit type, scannable bullets with the short SHA.
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }})
{%- endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
protect_breaking_commits = true
filter_commits = false
topo_order = false
sort_commits = "oldest"
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Tests" },
  { message = "^(ci|build)", group = "CI / Build" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps\\)", group = "Dependencies" },
  { message = "^chore", group = "Chores" },
  { message = "^style", group = "Styling" },
]
