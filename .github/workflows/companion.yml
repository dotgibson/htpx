# .github/workflows/companion.yml
# ──────────────────────────────────────────────────────────────────────────────
# Drift gate for the structured companion's source-of-truth bridge.
#
# The `offensive/companion/entries/` are canonical for the paired red<->blue
# attack/detection slice; where that overlaps the flat field references
# (PURPLE-TEAM.md, later hacktheplanet), the overlapping blocks are GENERATED from
# the entries inside `<!-- companion:gen ID -->` markers. This job runs the
# generator in --check mode so a hand-edit to a generated block — or an entry
# edit that wasn't regenerated — fails CI instead of silently drifting (the exact
# drift the bridge exists to kill). Fix: run offensive/companion/gen-views.sh and
# commit the result.
# ──────────────────────────────────────────────────────────────────────────────
name: companion

on:
  push:
    branches: [main, master]
    paths:
      - 'offensive/companion/**'
      - 'PURPLE-TEAM.md'
      - '.github/workflows/companion.yml'
  pull_request:
    paths:
      - 'offensive/companion/**'
      - 'PURPLE-TEAM.md'
      - '.github/workflows/companion.yml'
  workflow_dispatch:

concurrency:
  group: companion-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  drift:
    name: companion view drift (gen-views --check)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck the generator
        run: shellcheck -S warning offensive/companion/gen-views.sh

      - name: assert generated views are in sync with their entries
        run: ./offensive/companion/gen-views.sh --check
