name: ci
on:
  push: { branches: [main] }
  pull_request:
permissions: { contents: read }
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck + syntax
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck -S warning htpx gen-views.sh install.sh scripts/auto-tag.sh
          bash -n htpx gen-views.sh install.sh scripts/auto-tag.sh
      - name: drift gate (standalone — no flat-view targets)
        run: ./gen-views.sh --check
      - name: pairing graph + slot coverage
        run: |
          fail=0
          for f in entries/red/*.md entries/blue/*.md; do
            id=$(awk -F': *' '/^---/{n++;next} n==1 && $1=="id"{print $2;exit}' "$f")
            pair=$(awk -F': *' '/^---/{n++;next} n==1 && $1=="pair"{print $2;exit}' "$f")
            [ "$pair" = "null" ] && continue
            mate=$(grep -rl "^id: *$pair\$" entries | head -1)
            back=$([ -n "$mate" ] && awk -F': *' '/^---/{n++;next} n==1 && $1=="pair"{print $2;exit}' "$mate")
            [ "$back" = "$id" ] || { echo "BROKEN PAIR: $id -> $pair (back=$back)"; fail=1; }
          done
          u=$(comm -23 <(grep -rho '{{[a-z_]*}}' entries|sort -u) <(grep -o "'{{[a-z_]*}}'" htpx|tr -d "'"|sort -u))
          [ -z "$u" ] || { echo "UNHANDLED slots:"; echo "$u"; fail=1; }
          exit $fail
