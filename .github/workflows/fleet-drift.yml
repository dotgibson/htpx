name: fleet-drift

# Vendoring-drift dashboard for the fleet. sync-core.sh stamps every OS repo with a
# `core.lock` (core_sha=…) and dotfiles-Windows with nvim/.core-ref (commit = …) so
# each machine records WHICH Core it carries — but nothing compared those markers to
# Core's tip, so a repo could silently sit on a stale Core (exactly how the nvim
# lockfile drifted). Weekly (and on demand) this clones the fleet and runs
# scripts/fleet-drift.sh, failing red + writing a job summary when any repo lags.
#
# Read-only: it never pushes or opens a PR — the fix is a human running `make sync`
# (and nvim-sync.ps1 for Windows). First-party only: anonymous shallow clones of the
# public showcase repos + the job's own checkout; no third-party action to trust.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC, alongside the freshness bot
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: fleet-drift
  cancel-in-progress: true

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Full history (fetch-depth: 0) so rev-list can quantify how far behind each
      # recorded sha is; a shallow checkout would only ever report "DIFFERS".
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Clone the fleet (public, anonymous, shallow)
        run: |
          set -euo pipefail
          fleet="$RUNNER_TEMP/fleet"
          mkdir -p "$fleet"
          # Mirror scripts/os-repos.txt + the Windows host repo. We only read the
          # provenance markers, so depth 1 is plenty.
          repos=$(sed -e 's/#.*//' -e '/^[[:space:]]*$/d' scripts/os-repos.txt)
          for r in $repos dotfiles-Windows; do
            echo "::group::clone $r"
            git clone --depth 1 "https://github.com/${GITHUB_REPOSITORY_OWNER}/${r}.git" "$fleet/$r"
            echo "::endgroup::"
          done

      - name: Check fleet drift vs Core tip
        run: |
          set -o pipefail
          # Merge stderr into the pipe: fleet-drift.sh emits its drift rows + the
          # "fleet drift detected" line via fail() → stderr, so a stdout-only tee
          # would drop exactly the lagging repos from the job summary below.
          ./scripts/fleet-drift.sh --root "$RUNNER_TEMP/fleet" --ref HEAD --color never 2>&1 \
            | tee "$RUNNER_TEMP/drift.txt"
        # Capture the exit code for the summary step regardless of pass/fail.
        continue-on-error: true
        id: check

      - name: Job summary
        if: always()
        run: |
          {
            echo "### Fleet drift vs Core \`$(git rev-parse --short=12 HEAD)\`"
            echo ""
            echo '```'
            cat "$RUNNER_TEMP/drift.txt" 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Re-assert the check's verdict so a drifted fleet shows a red run.
      - name: Fail on drift
        if: steps.check.outcome != 'success'
        run: |
          echo "Fleet drift detected — run 'make sync' (and nvim-sync.ps1 for Windows)." >&2
          exit 1
