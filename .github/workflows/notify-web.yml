# Pings dotfiles-web to rebuild & redeploy its static showcase when this repo
# changes — the static-site equivalent of a cache purge. Receiving side:
# dotfiles-web's deploy.yml (repository_dispatch: refresh) + its README.
#
# Setup: add a fine-grained PAT with "Contents: Read and write" on
# Gerrrt/dotfiles-web as a repo secret named WEBHOOK_SECRET. Without it,
# this job no-ops.
name: Refresh showcase

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    # Any repo under the canonical owner may dispatch (every source repo does);
    # forks under other owners are excluded and lack the secret anyway.
    if: github.repository_owner == 'Gerrrt'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Notify dotfiles-web to rebuild
        env:
          TOKEN: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ]; then
            echo "::warning::WEBHOOK_SECRET not set — skipping showcase refresh"
            exit 0
          fi
          curl -fsS -X POST \
            --max-time 30 --retry 3 --retry-delay 5 --retry-connrefused \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Gerrrt/dotfiles-web/dispatches \
            -d '{"event_type":"refresh"}'
          echo "Dispatched refresh to dotfiles-web"
