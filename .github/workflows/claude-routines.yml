name: claude-routines

# Scheduled + on-demand "judgment-work" bots for htpx (.claude/commands), run HEADLESS
# and filed as deduplicated GitHub issues — so the chores that need judgment happen on
# their own instead of waiting for a human. Three routines:
#   • corpus-review     — weekly (Thu): red↔blue corpus quality + ATT&CK correctness
#                         (the JUDGMENT half; ci.yml gates the MECHANICAL half — pairing,
#                         slot vocabulary, view drift, shell lint).
#   • release-readiness — on-demand: go/no-go + the next SemVer for a release.
#   • release-notes     — on-demand: draft the CHANGELOG entry from Conventional Commits.
# The mirror of dotfiles-core / dotfiles-Defense's claude-routines.yml; htpx is the
# source of truth for the corpus, so its judgment layer lives here.
#
# First-party only (same principle as ci.yml): the Claude Code CLI is installed
# from npm at a PINNED version — NO third-party marketplace action to trust. Auth is
# the CLAUDE_CODE_OAUTH_TOKEN repo secret (a Claude subscription token minted with
# `claude setup-token`).
#
# INERT BY DEFAULT: with no CLAUDE_CODE_OAUTH_TOKEN secret the job no-ops with a warning
# (so a fork — or this repo before you opt in — never gets a red X). Add the secret to enable.

on:
  schedule:
    # Thu 08:00 UTC — deliberately off dotfiles-core's Tue 07:00–10:00 cluster and
    # dotfiles-Defense's Wed 08:00, so the fleet never draws on the Claude
    # subscription at the same time.
    - cron: "0 8 * * 4"
  workflow_dispatch:
    inputs:
      routine:
        description: "which routine to run"
        type: choice
        default: corpus-review
        # release-readiness / release-notes are dispatch-only — you run them AT release
        # time, not on a weekly beat.
        options: [corpus-review, release-readiness, release-notes]

permissions:
  contents: read

concurrency:
  group: claude-routines-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep in step with dotfiles-core's scripts/tool-versions.env CLAUDE_CODE_VERSION.
  CLAUDE_CODE_VERSION: "2.1.185"

jobs:
  # Gate: is the auth token configured? Secrets can't be read in a job-level `if`, so a
  # tiny job exposes presence as an output the real job depends on. Absent → warn and skip.
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      has_key: ${{ steps.k.outputs.has_key }}
    steps:
      - id: k
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "has_key=true" >>"$GITHUB_OUTPUT"
          else
            echo "has_key=false" >>"$GITHUB_OUTPUT"
            echo "::warning::CLAUDE_CODE_OAUTH_TOKEN secret not set — the Claude routines are scaffolded but inactive. Add the secret to enable them."
          fi

  # The judgment half of the corpus gate: reads the red↔blue entries, validates ATT&CK
  # tags against live MITRE, checks that each blue detection actually detects its paired
  # red technique, flags coverage holes, and files a report-first issue — edits nothing.
  # Complements ci.yml, which enforces the mechanical half (pairing, slots, drift) on
  # every change.
  corpus-review:
    needs: preflight
    if: >-
      needs.preflight.outputs.has_key == 'true' &&
      (github.event.schedule == '0 8 * * 4' ||
       github.event.inputs.routine == 'corpus-review')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ISSUE_TITLE: "corpus-review: weekly companion corpus review"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Claude Code CLI (pinned)
        # Fail fast if the pin is empty — never silently fall back to a floating `latest`.
        run: npm install -g "@anthropic-ai/claude-code@${CLAUDE_CODE_VERSION:?not set}"
      - name: Run /corpus-review
        run: |
          claude -p "/corpus-review" \
            --model opus \
            --permission-mode default \
            --allowedTools "Read,Grep,Glob,Bash(git ls-files:*),Bash(git log:*),WebSearch,WebFetch" \
            --output-format text | tee "$RUNNER_TEMP/corpus-review.md"
      - name: File the report as an issue
        # GH_TOKEN scoped to just this step (least privilege): it's only needed for the
        # final `gh` call, so it's not exposed to the `claude` routine run above.
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/workflows/file-routine-issue.sh "$ISSUE_TITLE" "$RUNNER_TEMP/corpus-review.md"

  # On-demand (dispatch-only): read the commits + CHANGELOG [Unreleased] since the last tag
  # and file a go/no-go verdict with the recommended next SemVer. fetch-depth: 0 — it runs
  # `git log <last-tag>..HEAD` / `git describe`, which a shallow clone can't.
  release-readiness:
    needs: preflight
    if: >-
      needs.preflight.outputs.has_key == 'true' &&
      github.event.inputs.routine == 'release-readiness'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ISSUE_TITLE: "release-readiness: go/no-go for the next htpx release"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Install Claude Code CLI (pinned)
        run: npm install -g "@anthropic-ai/claude-code@${CLAUDE_CODE_VERSION:?not set}"
      - name: Run /release-readiness
        run: |
          claude -p "/release-readiness" \
            --model opus \
            --permission-mode default \
            --allowedTools "Read,Grep,Glob,Bash(git log:*),Bash(git describe:*)" \
            --output-format text | tee "$RUNNER_TEMP/release-readiness.md"
      - name: File the report as an issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/workflows/file-routine-issue.sh "$ISSUE_TITLE" "$RUNNER_TEMP/release-readiness.md"

  # On-demand (dispatch-only): draft the next release's CHANGELOG entry from Conventional
  # Commits since the last tag. fetch-depth: 0 for the same git-log range reason.
  release-notes:
    needs: preflight
    if: >-
      needs.preflight.outputs.has_key == 'true' &&
      github.event.inputs.routine == 'release-notes'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ISSUE_TITLE: "release-notes: draft for the next htpx release"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Install Claude Code CLI (pinned)
        run: npm install -g "@anthropic-ai/claude-code@${CLAUDE_CODE_VERSION:?not set}"
      - name: Run /release-notes
        run: |
          claude -p "/release-notes" \
            --model opus \
            --permission-mode default \
            --allowedTools "Read,Grep,Glob,Bash(git log:*),Bash(git describe:*)" \
            --output-format text | tee "$RUNNER_TEMP/release-notes.md"
      - name: File the report as an issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/workflows/file-routine-issue.sh "$ISSUE_TITLE" "$RUNNER_TEMP/release-notes.md"
