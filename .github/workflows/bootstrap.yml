# .github/workflows/bootstrap.yml
# Thin caller for the reusable bootstrap test authored in dotfiles-core. The logic
# lives there (one place for the whole fleet); this just names Kali's container +
# the deps bootstrap needs, and sets offensive: true so the reusable test also
# asserts the offensive role layer (symlinks + the `offensive` loader stage).
# See dotfiles-core/.github/workflows/bootstrap-test.yml.
name: bootstrap

on:
  pull_request:
    paths: ['bootstrap.sh', 'core/**', 'os/**', 'ssh/**', 'offensive/**', '.github/workflows/bootstrap.yml']
  push:
    branches: [main]
    paths: ['bootstrap.sh', 'core/**', 'os/**', 'ssh/**', 'offensive/**', '.github/workflows/bootstrap.yml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    uses: Gerrrt/dotfiles-core/.github/workflows/bootstrap-test.yml@main
    with:
      image: kalilinux/kali-rolling
      prep: "apt-get update -qq && apt-get install -y -qq bash zsh"
      offensive: true
