# dotfiles-Kali/os/kali.conf  ->  ~/.config/tmux/os.conf
# OS-native tmux layer, sourced by Core's tmux.conf. Per-OS status-line bits.

# WSL has no battery; don't render an empty battery widget.
set -g @batt_enable false

# Network-speed widget watches the primary interface. WSL2 default is eth0;
# under mirrored networking you may prefer your host-visible iface instead.
set -g @netspeed_iface "eth0"
