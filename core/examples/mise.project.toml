# ════════════════════════════════════════════════════════════════════════════
# examples/mise.project.toml  —  drop into a project root AS `mise.toml`
#
# Your GLOBAL ~/.config/mise/config.toml (core/mise/config.toml) uses ~20% of
# mise: it pins runtime versions. This file shows the other 80% — the stuff that
# makes a per-PROJECT mise.toml replace direnv + a Makefile + half your Brewfile,
# all version-pinned and reproducible.
#
# Try it:   cp examples/mise.project.toml /some/project/mise.toml
#           cd /some/project && mise trust && mise install && mise tasks
# ════════════════════════════════════════════════════════════════════════════

# Glob-redact whole families of vars from `mise env` / task output, no matter where
# they're defined. TOP-LEVEL key (not under [env]).
redactions = ["*_TOKEN", "*_SECRET", "AWS_*"]

# ── 1. TOOLS, not just runtimes ──────────────────────────────────────────────
# mise installs CLI tools too, via backends — pinned per project, no Homebrew.
# aqua: = preferred (SLSA-verified, per-version logic). Others shown for range.
[tools]
node = "22"                       # runtime, like your global config
"aqua:BurntSushi/ripgrep" = "latest"   # rg, pinned to THIS repo
"aqua:sharkdp/fd" = "latest"
"cargo:tokei" = "latest"          # build-from-source Rust CLI
"npm:prettier" = "3"              # project-local prettier, no global npm i -g
"pipx:ruff" = "latest"            # isolated python CLI
"go:github.com/golangci/golangci-lint/cmd/golangci-lint" = "latest"

# ── 2. ENVIRONMENT — this is the direnv replacement ──────────────────────────
[env]
# plain vars (templated; {{...}} is tera, like direnv's export but declarative)
NODE_ENV = "development"
PROJECT_ROOT = "{{config_root}}"

# load a .env file (dotenv) — mise reads it, no `set -a; source` dance
_.file = ".env"

# prepend to PATH relative to the project (replaces `PATH_add ./bin` in .envrc)
_.path = ["{{config_root}}/bin", "{{config_root}}/node_modules/.bin"]

# run a shell script and import what it exports (escape hatch for dynamic env)
# _.source = "./scripts/setup-env.sh"

# SECRETS: redact from `mise env` / task output so they never hit logs/screenshare
DATABASE_URL = { value = "postgres://localhost/dev", redact = true }

# ENCRYPTED secrets via sops+age (you already have `age` installed): point _.file
# at a sops-encrypted .env.json/.yaml/.toml and mise auto-decrypts on entry.
# _.file = ".env.json"     # sops-encrypted; values land in env, plaintext never on disk

# ── 3. HOOKS — run things on enter/leave/cd (the other half of direnv) ────────
[hooks]
enter = "echo '→ entered {{config_root}} ($(node --version))'"
leave = "echo '← left project'"
# cd   = "ls"            # runs on every cd within the project
# postinstall = "pnpm install"   # auto-run after `mise install`

# ── 4. TASKS — a real task runner (replaces Make / npm scripts) ──────────────
# Parallel dependency graph, and `sources`/`outputs` give you incremental builds:
# mise skips a task whose sources haven't changed since outputs were written.
[tasks.lint]
description = "ruff + prettier check"
run = ["ruff check .", "prettier --check ."]

[tasks.build]
description = "compile (incremental — skipped if src/ unchanged)"
sources = ["src/**/*.ts"]
outputs = ["dist/**/*.js"]
run = "tsc -p ."

[tasks.test]
depends = ["lint", "build"]       # lint+build run first, in parallel
run = "node --test"

[tasks.dev]
description = "watch + rebuild (mise watch re-runs on file change)"
run = "node --watch src/index.ts"

[tasks.ci]
depends = ["test"]
run = "echo 'all green'"

# Usage:
#   mise run lint            mise run test         mise run            (picker)
#   mise watch build         mise tasks            mise run ci
#
# Bigger tasks → put them in ./mise-tasks/<name> as real scripts (full shell
# highlighting, args, no TOML escaping). `mise tasks` lists both kinds.

# ── 5. LOCKFILE & supply chain ───────────────────────────────────────────────
# `mise lock` writes mise.lock pinning exact versions + checksums → reproducible
# installs and no GitHub API rate-limits in CI. Commit mise.lock.
[settings]
lockfile = true
# minimum_release_age = "7d"   # supply-chain delay: refuse versions <7 days old
