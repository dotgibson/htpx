# .pre-commit-config.yaml — author-time guardrails for dotfiles-core.
# Mirrors the CI checks (.github/workflows/ci.yml) so drift is caught locally,
# before it is committed and subtree-synced into the 9 OS repos.
#
#   one-time:  pip install pre-commit && pre-commit install
#   manual:    pre-commit run --all-files
#
# zsh modules are intentionally excluded from shellcheck/shfmt (shellcheck has no
# zsh mode); scripts/audit-core.sh runs `zsh -n` on them instead. Each hook scopes
# itself via `files:`, so there is no global exclude (a global one would also
# suppress the luacheck hook below).

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-merge-conflict
      # Parse-check the config/data files that fan out to all 9 OS repos: a broken
      # starship.toml / mise config.toml / workflow yaml is valid text (shellcheck
      # & zsh -n never see it) but dead at runtime for every consumer. Mirrors the
      # toml/yaml section in scripts/audit-core.sh.
      - id: check-toml
      - id: check-yaml
      # check-json only matches *.json (not the *.jsonc config files) — it guards
      # nvim/lazy-lock.json, the reproducible-plugin pin set. Mirrors the json arm
      # in scripts/audit-core.sh.
      - id: check-json
      - id: check-executables-have-shebangs
      # The bug this whole effort started from: a script with a shebang that
      # isn't executable. Catches exec-bit regressions at commit time.
      - id: check-shebang-scripts-are-executable

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        args: ["-x"]
        files: '(\.sh|bin/clip|bin/clip-paste)$'

  # Markdown is the deliverable on this public showcase repo and the one file class
  # shellcheck/zsh -n/toml-yaml never inspect — so lint it at author time too.
  # Shares .markdownlint.jsonc with the audit's markdown section (one rule config).
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2

  # Secret scanning — Core ships 1Password helpers (zsh/op.zsh), a git-identity
  # template, and fans out to 9 PUBLIC repos, so a leaked token here amplifies
  # N-way. gitleaks at author time catches it in the commit diff before it lands;
  # the audit's "secrets" section (scripts/audit-core.sh) is the CI mirror. Pinned
  # rev kept in step with GITLEAKS_VERSION by the audit's version-consistency gate.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # NB: shfmt is intentionally NOT enforced — the scripts here use a deliberate
  # compact one-liner style that shfmt would expand (see scripts/audit-core.sh).
  # luacheck is NOT a standalone hook either: it discovers .luacheckrc by
  # searching up from the CWD, so run from repo root it misses nvim/.luacheckrc
  # and floods false "undefined vim" warnings. The audit-core hook below runs it
  # correctly (from inside nvim/) — one correct invocation, no duplication.

  # The contract check — manifest <-> filesystem drift + exec-bit invariants +
  # shellcheck + luacheck (run correctly). Local hook so it always runs the
  # in-repo script (single source of truth, identical to CI).
  - repo: local
    hooks:
      - id: audit-core
        name: Core manifest/exec-bit audit
        entry: ./scripts/audit-core.sh --quiet
        language: script
        pass_filenames: false
        always_run: true
