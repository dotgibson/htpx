# dependabot — keep the CI toolchain from rotting.
# Core is the keystone of a 9-repo system, so the few moving versions it pins
# (GitHub Actions in .github/workflows/ci.yml) should be nudged forward on a
# schedule rather than discovered stale during an incident.
#
# NB: dependabot has NO native pre-commit ecosystem, so the pinned hook revs in
# .pre-commit-config.yaml are bumped via `make update-hooks` (pre-commit
# autoupdate), not here. This file owns the github-actions ecosystem only.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
