# core/tmux/tmux.conf  → symlinked to ~/.config/tmux/tmux.conf
# ══════════════════════════════════════════════════════════════════════════════
# Portable base config + a hand-rolled tokyonight-storm status line.
#
# WHY HAND-ROLLED (was: janoamaral/tokyo-night-tmux): a plugin owns the whole bar
# and fights you the moment you want a custom segment. Rolling it by hand with
# native formats lets the status show what's actually useful to an operator — most
# importantly your VPN/tunnel IP (scripts/tmux-netinfo.sh) — and keeps the palette
# identical to Neovim + starship (tokyonight storm) instead of three near-themes.
#
# LAYERS (load order matters):
#   1. tmux.reset.conf  — the keybinding layer (sourced first; see that file)
#   2. this file        — terminal, options, theme/status, plugins
#   3. os.conf          — per-OS bits (battery, net iface) via @status_right_os
# ══════════════════════════════════════════════════════════════════════════════

# ── 1. Keybinding layer (omerxx-style split) ─────────────────────────────────
source-file ~/.config/tmux/tmux.reset.conf

# =========================================================
# Colours & Terminal
# =========================================================
set -g  default-terminal "tmux-256color"
set -ga terminal-features ",*:RGB"
set -ga terminal-overrides ",*:Tc"

# =========================================================
# Options
# =========================================================
set -g  mouse on
set -g  history-limit 100000
set -g  base-index 1
set -g  pane-base-index 1
set-window-option -g pane-base-index 1
set -g  renumber-windows on
set -g  detach-on-destroy off        # closing a session jumps to another, not exit
set -g  set-clipboard on             # let apps set the system clipboard (OSC 52)
set -g  focus-events on              # nvim autoread / checkhealth
set -sg escape-time 10               # nvim checkhealth
set-option -g set-titles on
set-option -g set-titles-string "#{session_name} · #{pane_current_command}"

# =========================================================
# tokyonight-storm palette (kept in sync with starship.toml + tmux-netinfo.sh)
# =========================================================
set -g @tn_bg      "#24283b"
set -g @tn_bg_dark "#1f2335"
set -g @tn_bg_hl   "#292e42"
set -g @tn_fg      "#c0caf5"
set -g @tn_fg_dim  "#a9b1d6"
set -g @tn_blue    "#7aa2f7"
set -g @tn_cyan    "#7dcfff"
set -g @tn_green   "#9ece6a"
set -g @tn_magenta "#bb9af7"
set -g @tn_red     "#f7768e"
set -g @tn_yellow  "#e0af68"
set -g @tn_orange  "#ff9e64"
set -g @tn_comment "#565f89"
set -g @tn_black   "#414868"

# rounded pill caps (Nerd Font) — segments "float" on the transparent bar
set -g @cap_l ""
set -g @cap_r ""

# =========================================================
# Pane borders (transparent bg; active = magenta, like nvim's accent)
# =========================================================
set -g pane-border-style        "fg=#{@tn_black},bg=default"
set -g pane-active-border-style "fg=#{@tn_magenta},bg=default"
set -g pane-border-status off

# =========================================================
# Status bar — transparent base; everything is pills
# =========================================================
set -g status on
set -g status-interval 5
set -g status-position top
set -g status-justify left
set -g status-style "bg=default,fg=#{@tn_fg}"

# ── LEFT: session pill. Colour + glyph track state: ──────────────────────────
#      normal → blue · prefix active → orange · copy/search mode → yellow
set -g status-left-length 60
set -g status-left "\
#[fg=#{?client_prefix,#{@tn_orange},#{?pane_in_mode,#{@tn_yellow},#{@tn_blue}}},bg=default]#{@cap_l}\
#[fg=#{@tn_bg},bg=#{?client_prefix,#{@tn_orange},#{?pane_in_mode,#{@tn_yellow},#{@tn_blue}}},bold] #{?client_prefix,󰠠,#{?pane_in_mode,󰆏,}} #S \
#[fg=#{?client_prefix,#{@tn_orange},#{?pane_in_mode,#{@tn_yellow},#{@tn_blue}}},bg=default]#{@cap_r} "

# ── WINDOWS: inactive = muted pill · current = blue pill (+ zoom glyph) ───────
set -g window-status-separator " "
set -g window-status-format "\
#[fg=#{@tn_bg_hl},bg=default]#{@cap_l}\
#[fg=#{@tn_comment},bg=#{@tn_bg_hl}] #I:#W \
#[fg=#{@tn_bg_hl},bg=default]#{@cap_r}"
set -g window-status-current-format "\
#[fg=#{@tn_blue},bg=default]#{@cap_l}\
#[fg=#{@tn_bg},bg=#{@tn_blue},bold] #I:#W#{?window_zoomed_flag, 󰊓,} \
#[fg=#{@tn_blue},bg=default]#{@cap_r}"

# ── RIGHT: operator-IP (script) · cwd basename · clock · per-OS bits ──────────
#    @status_right_os is appended by each OS repo's os.conf (battery, etc.);
#    default empty so boxes without one render cleanly.
set -gq @status_right_os ""
set -g status-right-length 150
set -g status-right "\
#(~/.config/tmux/scripts/tmux-netinfo.sh) \
#[fg=#{@tn_green},bg=default]#{@cap_l}#[fg=#{@tn_bg},bg=#{@tn_green},bold] 󰉋 #{b:pane_current_path} #[fg=#{@tn_green},bg=default]#{@cap_r} \
#[fg=#{@tn_magenta},bg=default]#{@cap_l}#[fg=#{@tn_bg},bg=#{@tn_magenta},bold] 󰥔 %H:%M #[fg=#{@tn_magenta},bg=default]#{@cap_r}\
#{@status_right_os}"

# message / command-prompt styling
set -g message-style "fg=#{@tn_bg},bg=#{@tn_yellow},bold"
set -g mode-style    "fg=#{@tn_bg},bg=#{@tn_yellow}"

# =========================================================
# Plugins
# =========================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'   # C-h/j/k/l cross into nvim
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'wfxr/tmux-fzf-url'                # prefix+u: fzf URLs out of pane (recon-handy)

# tokyo-night-tmux removed — the bar above is hand-rolled.

# ── resurrect + continuum ─────────────────────────────────────────────────────
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ── tmux-fzf-url ──────────────────────────────────────────────────────────────
set -g @fzf-url-bind 'u'
set -g @fzf-url-fzf-options '-w 60% -h 40% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# ── per-OS bits (netspeed iface + battery → @status_right_os): os/<os>.conf ───
source-file -q ~/.config/tmux/os.conf

# =========================================================
# Pop-ups  (scripts live in core/tmux/scripts → ~/.config/tmux/scripts)
# =========================================================
bind w display-popup -E -w 40% -h 50% "~/.config/tmux/scripts/tmux-menu.sh"
bind T display-popup -EE -w 80% -h 80% "~/.config/tmux/scripts/tmux-scratch.sh"
bind g display-popup -d "#{pane_current_path}" -EE -w 85% -h 85% lazygit
# prefix + f — sesh session picker (replaces tmux-sessionizer.sh)
bind f display-popup -E -w 55% -h 65% "~/.config/tmux/scripts/tmux-sesh.sh"
bind ? display-popup -E -w 78% -h 80% "~/.config/tmux/scripts/tmux-cheat.sh"

# =========================================================
# TPM bootstrap (auto-clone TPM on first run)
# =========================================================
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"
run '~/.config/tmux/plugins/tpm/tpm'
