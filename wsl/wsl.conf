# dotfiles-Kali/wsl/wsl.conf  ->  /etc/wsl.conf   (installed by bootstrap; __WSL_USER__ substituted)
# This is the DISTRO-side config. Global WSL2 settings (memory, CPU, and the
# all-important networkingMode) live on the WINDOWS side in %UserProfile%\.wslconfig
# — see wsl/windows.wslconfig.example.

[boot]
systemd=true

[user]
default=__WSL_USER__

[interop]
enabled=true
appendWindowsPath=true

[network]
generateResolvConf=true
generateHosts=true
